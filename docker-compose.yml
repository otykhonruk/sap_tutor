version: '3.8'

services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    ports:
      - "8080:8080"
    environment:
      - MODE=json-rpc
    volumes:
      # Using the existing volume 'signal-cli-state' from Makefile
      - signal-cli-state:/home/.local/share/signal-cli
    restart: unless-stopped

  bot:
    build: .
    depends_on:
      - signal-api
    environment:
      - SIGNAL_API_URL=http://signal-api:8080
      # Use .env or docker-compose environment vars to pass API keys and ACCOUNT
    env_file:
      - .env
    volumes:
      # Keep the history db in a local folder
      - ./_data:/app/_data
    restart: unless-stopped

volumes:
  signal-cli-state:
    external: true
